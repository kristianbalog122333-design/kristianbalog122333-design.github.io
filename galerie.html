<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie - Kafe Střekov</title>
    <link rel="stylesheet" href="kafe.css">
    <style>
        main.menu-open {
    padding-top: 250px !important;
}
        body { background: linear-gradient(90deg,#391d00 0%,#3d290a 100%); }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .gallery-center { display:flex; justify-content:center; }
        /* Dark panel behind gallery content */
        .gallery-panel {
            background: rgba(18, 12, 8, 0.64);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 10px 36px rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            color: #f3efe8;
        }
        .gallery-panel .gallery-title { color: #fff; }
        .gallery-panel #galleryMsg { color: #e6e1da; }
        .gallery-grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap:16px; width:100%; align-items:start; }
        /* Portrait-friendly thumbnails */
        .gallery-grid img { width:100%; aspect-ratio: 3/4; object-fit:cover; border-radius:8px; display:block; box-shadow: 0 6px 18px rgba(0,0,0,0.12); transition: transform .28s ease, box-shadow .28s ease; }
        .gallery-grid img:hover { transform: scale(1.03); box-shadow: 0 12px 30px rgba(0,0,0,0.18); }
        @media (max-width:480px){ .gallery-grid { grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); } .gallery-grid img{ aspect-ratio: 2/3; } }
        header, footer { text-align:center; }

        @media (min-width: 822px) and (max-width: 1200px) {
            .gallery-center { padding-top: 160px; }
        }
        @media (max-width: 821px) {
            .gallery-center { padding-top: 100px; }
        }
        @media (max-width: 822px) {
            .gallery-title { padding-right: 0 !important; }
        }
         @media (min-width: 1201px) {
            .gallery-center { padding-top: 200px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header">
            <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            <nav class="nav-menu" id="navMenu">
                <a href="main.html" class="header-link">O NÁS</a>
                <a href="menu.html" class="header-link">MENU</a>
                <a href="main.html" class="header-logo"><img class="logo_stred" src="logos.png" alt="Logo"></a>
                <a href="rezervace.html" class="header-link">REZERVACE</a>
                <a href="galerie.html" class="header-link">GALERIE</a>
            </nav>
        </div>
    </header>

    <main class="gallery-center">
        <div class="container">
            <div class="gallery-panel">
                <h1 class="gallery-title" style="text-align:center;margin-bottom:12px;padding-right: 11.5%;">Galerie</h1>
                <div id="galleryGrid" class="gallery-grid" aria-live="polite"></div>
                <p id="galleryMsg" style="text-align:center;margin-top:12px"></p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Kafe Střekov.</p>
        </div>
    </footer>

    <script>
        // Load image list from local index.json and render images from obrazky_galerie/
        (async function(){
            const grid = document.getElementById('galleryGrid');
            const msg = document.getElementById('galleryMsg');
            try {
                const res = await fetch('obrazky_galerie/index.json');
                if (!res.ok) throw new Error('index.json not found');
                const files = await res.json();
                if (!Array.isArray(files) || files.length === 0) { msg.textContent = 'Galerie je prázdná.'; return; }
                files.forEach(name => {
                    const img = document.createElement('img');
                    img.src = `obrazky_galerie/${name}`;
                    img.alt = '';
                    img.loading = 'lazy';
                    img.addEventListener('error', () => {
                        const placeholder = document.createElement('div');
                        placeholder.textContent = 'Obrázek nelze načíst';
                        placeholder.style.padding = '12px';
                        placeholder.style.background = '#fff';
                        placeholder.style.border = '1px solid #eee';
                        placeholder.style.borderRadius = '6px';
                        grid.replaceChild(placeholder, img);
                    });
                    grid.appendChild(img);
                });
            } catch (err) {
                console.error(err);
                msg.textContent = 'Galerii se nepodařilo načíst.';
            }
        })();
    </script>
    <script>
        // Hamburger menu JS (toggle classes)
        (function(){
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('navMenu');
            const headerLinks = navMenu ? navMenu.querySelectorAll('.header-link') : [];
            if (!hamburger || !navMenu) return;
            hamburger.addEventListener('click', () => {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
                document.querySelector('main')?.classList.toggle('menu-open');
                document.querySelector('.mobile-menu-buttons')?.classList.toggle('menu-open');
            });
            headerLinks.forEach(link => link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
                document.querySelector('main')?.classList.remove('menu-open');
                document.querySelector('.mobile-menu-buttons')?.classList.remove('menu-open');
            }));
        })();
    </script>
</body>
</html>
