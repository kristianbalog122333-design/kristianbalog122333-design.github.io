  <script>
    // Vlastní kalendář - 7 dní
    const dnyNazvy = ['Ne', 'Po', 'Út', 'St', 'Čt', 'Pá', 'So'];
    const mesice = ['ledna', 'února', 'března', 'dubna', 'května', 'června', 'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];

    const datumInput = document.getElementById('datum');
    
    for (let i = 0; i < 7; i++) {
      const den = new Date();

      const btn = document.createElement('button');
      btn.type = 'button';

        document.querySelectorAll('.datum-btn').forEach(b => b.classList.remove('aktivni'));
        btn.classList.add('aktivni');
        datumInput.value = btn.dataset.datum;
      });

      kontejner.appendChild(btn);
    }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { 
      getFirestore, 
      collection, 
      addDoc, 
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADcpSKQhPXHA3AdQEvCTUKeQY169RF8u4",
      authDomain: "kafe-strekov-932ee.firebaseapp.com",
      projectId: "kafe-strekov-932ee",
      storageBucket: "kafe-strekov-932ee.firebasestorage.app",
      messagingSenderId: "173140321608",
      appId: "1:173140321608:web:ffe8ef549a9b22e8f3bf7d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Owner copy removed — posílá se pouze zákazníkovi

    const form = document.getElementById("rezForm");
    const zprava = document.getElementById("zprava");
    const obsazenostGrid = document.getElementById("obsazenostGrid");

    const dnyNazvyFull = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];

    const CSV_URL_OTEVIRACI = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQz_ZmSJpBy2ebJ4lgXrYsQuPkx6WlQiBQWfqZUAZPKpgtot0aO8a-JNyts2yCQfFgFtEw33XXBOSM7/pub?gid=1604181837&single=true&output=csv";

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    }

    async function nactiRezervace() {
        try {
          // Načtení zavřených dnů z CSV
          const res = await fetch(CSV_URL_OTEVIRACI);
          if (!res.ok) {
            console.error('Chyba při načítání CSV (status):', res.status);
            return;
          }
          const text = await res.text();
        const rows = text.trim().split("\n").map(parseCSVLine);
        // Mapování dnů na otevírací dobu / zavřeno
        const openingMap = {};
        rows.forEach((cols, idx) => {
          if (idx === 0) return; // přeskočit hlavičku
          const day = cols[0]?.trim();
          const time = cols[1]?.trim();
          if (!day) return;
          if (!time || time.toLowerCase().includes('zavřeno')) {
            openingMap[day] = { closed: true };
          } else {
            const parts = time.split(';').map(s => s.trim()).filter(Boolean);
            const intervals = parts.map(p => {
              const m = p.match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
              if (m) {
                return { startH: parseInt(m[1], 10), startM: parseInt(m[2], 10), endH: parseInt(m[3], 10), endM: parseInt(m[4], 10) };
              }
              const m2 = p.match(/(\d{1,2})\s*-\s*(\d{1,2})/);
              if (m2) return { startH: parseInt(m2[1], 10), startM: 0, endH: parseInt(m2[2], 10), endM: 0 };
              return null;
            }).filter(Boolean);
            if (intervals.length) openingMap[day] = { closed: false, intervals };
          }
        });

        // Aplikuj zavřeno také na tlačítka výběru data podle názvu dne (stejně jako main.html)
        try {
          const datumButtons = document.querySelectorAll('.datum-btn');
          datumButtons.forEach(btn => {
            const iso = btn.dataset.datum;
            if (!iso) return;
            const den = new Date(iso);
            const dayFull = dnyNazvyFull[den.getDay()];
            const openInfo = openingMap[dayFull];
            const mes = btn.querySelector('.den-mesic');
            if (!openInfo || openInfo.closed) {
              btn.classList.add('zavreno');
              btn.disabled = true;
              if (mes) mes.textContent = 'zavřeno';
            } else {
              btn.classList.remove('zavreno');
              btn.disabled = false;
              if (mes) {
                mes.textContent = mesice[den.getMonth()];
              }
            }
          });
        } catch (btnErr) {
          console.warn('Chyba při aplikaci zavřeno na datum tlačítka:', btnErr);
        }

        const querySnapshot = await getDocs(collection(db, "rezervace"));
      
      // Sběr rezervací podle data a hodiny (počítáme kolik rezervací na slot)
      const rezervaceMap = {};
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        if (!rezervaceMap[data.datum]) rezervaceMap[data.datum] = {};
        const hodina = parseInt(data.od.split(':')[0]);
        // Každá rezervace zabere 2 sloty (1.5h = 90 min)
        for (let i = 0; i < 2; i++) {
          if (!rezervaceMap[data.datum][hodina + i]) rezervaceMap[data.datum][hodina + i] = 0;
          rezervaceMap[data.datum][hodina + i]++;
          // Pokud je rezervace pro více než 4 osoby, přičti další 2 stoly
          if (data.osoby && data.osoby > 4) {
            rezervaceMap[data.datum][hodina + i] += 2;
          }
        }
      });

      // Generování gridu pro 7 dní
      obsazenostGrid.innerHTML = '';
      for (let d = 0; d < 7; d++) {
        const den = new Date();
        den.setDate(den.getDate() + d);
        const datumStr = den.toISOString().split('T')[0];
        
        const radek = document.createElement('div');
        radek.className = 'obsazenost-radek';
        
        const nazevDne = document.createElement('div');
        nazevDne.className = 'obsazenost-den';
        nazevDne.textContent = `${dnyNazvyFull[den.getDay()]} ${den.getDate()}.${den.getMonth()+1}.`;
        radek.appendChild(nazevDne);
        
        const hodinyDiv = document.createElement('div');
        hodinyDiv.className = 'obsazenost-hodiny';
        
        // Kontrola podle CSV/otevírací doby
        const dayName = dnyNazvyFull[den.getDay()];
        const openInfo = openingMap[dayName];
        if (!openInfo || openInfo.closed) {
          radek.classList.add('zavreno');
          const zavrenoSlot = document.createElement('div');
          zavrenoSlot.className = 'obsazenost-zavreno';
          zavrenoSlot.textContent = 'Zavřeno';
          hodinyDiv.appendChild(zavrenoSlot);
        } else {
          // Použij první interval jako rozsah hodin (inkluzivně). Fallback: Sobota do 18h, ostatní do 19h
          
         
          let startH = 10;
          let endH = den.getDay() === 6 ? 18 : 19;
          if (openInfo.intervals && openInfo.intervals.length) {
            const it = openInfo.intervals[0];
            startH = typeof it.startH === 'number' ? it.startH : startH;
            endH = typeof it.endH === 'number' ? it.endH : endH;
          }
          for (let h = startH; h <= endH; h++) {
                const slot = document.createElement('div');
                slot.className = 'obsazenost-slot';
                const pocet = (rezervaceMap[datumStr] && rezervaceMap[datumStr][h]) || 0;
                if (pocet >= 5) {
                    slot.classList.add('obsazeno');
                } else if (pocet > 0) {
                    slot.classList.add('castecne');
                }
                slot.textContent = h;
                slot.dataset.tooltip = `${pocet}/5 stolů`;
                hodinyDiv.appendChild(slot);
            }
             
        }
           
        radek.appendChild(hodinyDiv);
        obsazenostGrid.appendChild(radek);
      }
    } catch (fetchErr) {
      console.error('Chyba při načítání nebo parsování CSV:', fetchErr);
      return;
    }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const jmeno = document.getElementById("jmeno").value.trim();
      const telefon = document.getElementById("telefon").value.trim();
      const email = document.getElementById("email").value.trim();
      const datum = document.getElementById("datum").value.trim();
      const hodina = document.getElementById("hodina").value;
      const minuta = document.getElementById("minuta").value;
      const osoby = parseInt(document.getElementById("osoby").value);

      let chyby = [];
      // Jméno: min 3 znaky, nesmí obsahovat čísla
      if (!jmeno) chyby.push("Jméno");
      else if (jmeno.length < 3) chyby.push("Jméno musí mít alespoň 3 znaky");
      else if (/\d/.test(jmeno)) chyby.push("Jméno nesmí obsahovat čísla");

      // Telefon: pouze čísla, 9 číslic (s mezerou nebo bez)
      const telCisty = telefon.replace(/\s+/g, "");
      if (!telefon) chyby.push("Telefon");
      else if (!/^\d{9}$/.test(telCisty)) chyby.push("Telefon musí mít 9 číslic");

      // Email: základní validace
      if (!email) chyby.push("E-mail");
      else if (!/^\S+@\S+\.\S+$/.test(email)) chyby.push("E-mail není platný");

      if (!datum) chyby.push("Datum");
      if (!hodina) chyby.push("Hodina");
      if (!minuta) chyby.push("Minuta");
      if (!osoby || isNaN(osoby)) chyby.push("Počet osob");
      if (osoby > 8) chyby.push("Maximální počet osob je 8");

      if (chyby.length > 0) {
        zprava.innerText = "Vyplňte správně: " + chyby.join(", ");
        return;
      }

      const novaRezervace = {
        jmeno,
        telefon,
        email,
        datum,
        od: hodina + ":" + minuta,
        delka: 90,
        osoby
      };

      try {
        // Kontrola, zda je vybraný slot volný (kapacita 5 stolů)
        try {
          const q = query(collection(db, "rezervace"), where("datum", "==", datum));
          const snap = await getDocs(q);
          const slotCounts = {};
          snap.forEach(sdoc => {
            const d = sdoc.data();
            const startH = parseInt(d.od.split(':')[0]);
            for (let i = 0; i < 2; i++) {
              const slot = startH + i;
              if (!slotCounts[slot]) slotCounts[slot] = 0;
              slotCounts[slot] += 1;
              if (d.osoby && d.osoby > 4) slotCounts[slot] += 2; // víc osob zabere víc stolů
            }
          });
          const selH = parseInt(hodina);
          const required = (osoby && !isNaN(osoby) && osoby > 4) ? 1 + 2 : 1; // 1 slot (+2 extra tables if >4 osoby)
          const nextH = selH + 1;
          const countSel = slotCounts[selH] || 0;
          const countNext = slotCounts[nextH] || 0;
          if ((countSel + required) > 6 || (countNext + required) > 6) {
            zprava.textContent = "Vybraný čas není dostupný";
            zprava.style.background = "#f8d7da";
            zprava.style.color = "#721c24";
            zprava.style.padding = "12px 16px";
            zprava.style.borderRadius = "8px";
            zprava.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)";
            zprava.style.display = "block";
            zprava.style.marginTop = "12px";
            zprava.setAttribute('role', 'alert');
            try { zprava.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e) {}
            setTimeout(() => {
              zprava.style.transition = 'opacity 0.5s';
              zprava.style.opacity = '0';
              setTimeout(() => { zprava.style.display = 'none'; zprava.style.opacity = '1'; }, 500);
            }, 5000);
            return;
          }
        } catch (checkErr) {
          console.warn('Nelze ověřit obsazenost:', checkErr);
          chyby.push('Nelze ověřit obsazenost, zkuste později');
        }

        // Pokud kontrola obsazenosti přidala chyby, nezapisuj rezervaci
        if (chyby.length > 0) {
          zprava.innerText = "Vyplňte správně: " + chyby.join(", ");
          return;
        }

        await addDoc(collection(db, "rezervace"), novaRezervace);
          const templateParams = {
            jmeno,
            telefon,
            email,
            datum,
            od: hodina + ":" + minuta,
            osoby
          };
          if (window.emailjs && typeof emailjs.send === 'function') {
            try {
              const resp = await emailjs.send("service_5pkk4no","template_dm9lunp", templateParams);
              console.log('EmailJS send response:', resp);
            } catch (emailErr) {
              console.error('Email send failed', emailErr);
            }

            // owner copy removed — odesílá se pouze zákazníkovi
          } else {
            console.warn('emailjs not available at submit time; email was not sent.');
          }
          // Zvýrazněná notifikace místo jednoduchého textu
          zprava.textContent = "Rezervace byla uložena ✅";
          zprava.style.background = "#ffffff";
          zprava.style.color = "#111";
          zprava.style.padding = "12px 16px";
          zprava.style.borderRadius = "8px";
          zprava.style.boxShadow = "0 2px 8px rgba(0,0,0,0.12)";
          zprava.style.display = "block";
          zprava.style.marginTop = "12px";
          zprava.setAttribute('role', 'status');
          try { zprava.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch(e) {}
          // Po 5s notifikaci skryjeme (krátký fade)
          setTimeout(() => {
            zprava.style.transition = 'opacity 0.5s';
            zprava.style.opacity = '0';
            setTimeout(() => { zprava.style.display = 'none'; zprava.style.opacity = '1'; }, 500);
          }, 5000);
          form.reset();
          nactiRezervace();
      } catch (err) {
        console.error(err);
        zprava.innerText = "Chyba při ukládání rezervace!";
      }
    });

    nactiRezervace();
  </script>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('navMenu');
    const headerLinks = navMenu.querySelectorAll('.header-link');
    const rezervaceWrapper = document.querySelector('.rezervace-wrapper');

    function setRezervaceWrapperClass(open) {
      if (!rezervaceWrapper) return;
      // keep original class and toggle a modifier class
      rezervaceWrapper.classList.toggle('rezervace-wrapper--menu-open', open);
      // Use inline !important to override other stylesheet !important rules if necessary
      if (open) {
        rezervaceWrapper.style.setProperty('padding-top', '250px', 'important');
      } else {
        rezervaceWrapper.style.removeProperty('padding-top');
      }
    }

    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navMenu.classList.toggle('active');
      document.querySelector('main')?.classList.toggle('menu-open');
      document.querySelector('.mobile-menu-buttons')?.classList.toggle('menu-open');
      // change rezervace wrapper class when menu opens/closes
      setRezervaceWrapperClass(navMenu.classList.contains('active'));
    });

    headerLinks.forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
          document.querySelector('main')?.classList.remove('menu-open');
          document.querySelector('.mobile-menu-buttons')?.classList.remove('menu-open');
          setRezervaceWrapperClass(false);
        });
    });
  </script>

</body>
</html>
