<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Kafe-střekov</title>
  <link rel="stylesheet" href="kafe.css">
  <style>

.hamburger-img {
  display: none;
 
}

/* Pokud je obrazovka 520px a méně, zobraz */
@media (max-width: 820px) {
  .hamburger-img {
    display: block;
  }
}
    
    #menu-container {
         border: 2px solid #d4a574;
    border-radius: 15px;
    max-width: 1400px;
    background: linear-gradient(135deg, rgb(10 18 14 / 95%) 0%, rgb(23 47 35 / 98%) 100%);
    box-shadow: 0 8px 32px rgba(212, 165, 116, 0.2), inset 0 0 60px rgba(212, 165, 116, 0.05);
    position: relative;
    overflow: hidden;}

    /* Additional container matching #menu-container sizing */
    .menu-aux {
      border: none;
      border-radius: 15px;
      max-width: 1400px;
      background: transparent;
      box-shadow: none;
      position: absolute; /* overlap */
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }
    /* images that span the auxiliary overlay */
    .menu-aux .aux-img {
      position: absolute;
      pointer-events: none;
      opacity: 0.2;
          width: 600px;
      
      transform: translate(-50%, -50%);
      z-index: 5;
    }

    /* ensure the container inside menu-section is positioning context for absolute overlay */
    .menu-section > .container { position: relative; }

    /* Dekorativní obrázky rozprostřené procentuálně přes #menu-container */
    .deco-img {
      position: absolute;
      left: 0;
      top: 0;
 
      height: auto;
      opacity: 0.10;
      pointer-events: none;
      z-index: 2;
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
      transition: transform 0.15s ease-out, opacity 0.2s ease;
    }

    /* drobné otočení přes CSS proměnnou (sloučeno v .deco-img) */

    /* Mírné zvětšení při scrollu (bez JS parallax) */
    .deco-img.scroll-zoom { transition: transform 0.3s ease; }

    /* Na mobilu schovej dekorace pro přehlednost */
    @media (min-width:821px){
      deco-img{max-width: 620px !important; width: 620px;}
      menu-aux .aux-img {max-width: 620px !important; width: 620px;}
    }
    @media (min-width:521px) (max-width: 820px) {
      .deco-img { display: none; }
      .menu-aux .aux-img {
        width: 450px !important; max-width: 450px !important;
   
      }
  
    }  
    @media (max-width: 521px) {
      .deco-img { display: none; }
      .menu-aux .aux-img {
        width: 300px !important; max-width: 300px !important;
   
      }
  
    }   .menu-aux .aux-img { 
    opacity: 0.10 !important;
    }

    #menu-container::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px solid rgba(212, 165, 116, 0.3);
      border-radius: 10px;
      pointer-events: none;
      z-index: 0; /* lower so decorative images can appear above this overlay */
    }

    /* overlay and layering:
       ::before (frame) z-index:0
       .deco-overlay (transparent layer) z-index:1
       .deco-img (decorative images) z-index:2
       content inside container z-index:3 */
    .deco-overlay { position: absolute; inset: 0; background: rgb(242, 0, 255); pointer-events: none; z-index: 1; }
    .deco-img { z-index: 2; }
    #menu-container > * { position: relative; z-index: 3; }

    .menu-table { 
      width: 100%; 
      border-collapse: separate; 
      border-spacing: 0 5px; 
      margin-bottom: 80px; 
      color: white; 
    }
    .menu-table td { 
      padding: 15px 10px; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
      vertical-align: middle; 
    }
    .item-name { font-weight: 600; font-size: 1.2rem; color: #ffffff; text-align: left; }
    .item-description { font-weight: 400; font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); text-align: left; font-style: italic; padding: 12px 2px; }
    .item-size { font-weight: 400; font-size: 1rem; color: rgba(255, 255, 255, 0.7); font-style: italic; text-align: center; }
    .item-price { font-weight: 700; font-size: 1.2rem; color: #d4a574; text-align: right; white-space: nowrap; }
    
    /* Responsive - pod 820px: 3 části - name+desc | size | price */
    @media (max-width: 820px) {
      .menu-table {
        display: block;
      }
      .menu-table tr {
        display: grid;
        grid-template-columns: 1fr auto auto;
        grid-template-rows: auto auto;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 0;
        align-items: center;
      }
      .menu-table td {
        display: block;
        border-bottom: none !important;
      }
      .menu-table td.item-name {
        grid-column: 1;
        grid-row: 1;
        padding: 8px 8px 2px 8px !important;
        white-space: normal !important;
      }
      .menu-table td.item-description {
        grid-column: 1;
        grid-row: 2;
        padding: 2px 8px 8px 8px !important;
      }
      .menu-table td.item-description:empty {
        display: none;
      }
      .menu-table td.item-size {
        grid-column: 2;
        grid-row: 1 / 3;
        padding: 8px 15px !important;
        text-align: center;
        white-space: nowrap !important;
        align-self: center;
      }
      .menu-table td.item-price {
        grid-column: 3;
        grid-row: 1 / 3;
        padding: 8px !important;
        text-align: right;
        white-space: nowrap !important;
        align-self: center;
      }
      /* Pro jídlo bez size - cena ve 2. sloupci */
      .menu-table tr:not(:has(.item-size)) td.item-price {
        grid-column: 2;
        grid-row: 1 / 3;
        align-self: center;
      }
      .menu-sub-category-td {
        grid-column: 1 / 4;
        padding: 30px 8px 10px 8px !important;
      }
    }
    
  </style>
</head>
<body>

<div class="header">
  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-menu" id="navMenu">
    <a href="main.html" class="header-link">O NÁS</a>
    <div class="nav-item-container">
      <a href="menu.html" class="header-link">MENU</a>

    <a href="main.html" class="header-logo">

      <a href="rezervace.html" class="header-link">REZERVACE</a>
      <a href="#jidelni-listek" class="sub-link jidelni">JÍDELNÍ LÍSTEK</a>
    </div>
    <a href="galerie.html" class="header-link">GALERIE</a>
  </nav>
</div>

<div class="mobile-menu-buttons">
  <a href="#napojovy-listek" class="mobile-menu-link">NÁPOJOVÝ LÍSTEK</a>
  <a href="#jidelni-listek" class="mobile-menu-link">JÍDELNÍ LÍSTEK</a>
</div>

<main>
<section class="menu-section">
  <div class="container text-center">
    <div id="menu-container">
      <!-- Full-size transparent overlay (under decorative images) -->
      <div class="deco-overlay" aria-hidden="true"></div>
      <!-- dekorativni obrazky odstraneny -->
    </div>

    <!-- New auxiliary container with same size as menu-container -->
    <div class="menu-aux" aria-hidden="false">
      <!-- Decorative images placed across the auxiliary overlay -->
      <img src="bi1.png" class="aux-img" style="left:8%; top:10%;" alt="">
      <img src="bi.png" class="aux-img" style="left:90%; top:35%;" alt="">
      <img src="bi3.png" class="aux-img" style="left:10%; top:55%;" alt="">
      <img src="bi4.png" class="aux-img" style="left:80%; top:75%;" alt="">
<!-- Obrázky viditelné pouze při aktivním hamburger menu -->

 <img src="bi2.png" class="hamburger-img aux-img" id="hamburger-img" style="left:50%; top:20%;" alt="">
  <img src="bi.png" class="hamburger-img aux-img" id="hamburger-img"  style="left:60%; top:45%;" alt="">

  <img src="bi1.png" class="hamburger-img aux-img" id="hamburger-img"  style="left:62%; top:60%;" alt="">


      <div style="text-align:center;color:#d4a574;font-weight:700;"></div>
    </div>
</section>
</main>

<footer>
  <div class="container">
     <p>&copy; 2026 Kafe Střekov.</p>
  </div>
</footer>

<script>
  // =========================
  // TVOJE CSV ODKAZY Z GOOGLE SHEETS
  // =========================
  const CSV_URL_NAPOJE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQz_ZmSJpBy2ebJ4lgXrYsQuPkx6WlQiBQWfqZUAZPKpgtot0aO8a-JNyts2yCQfFgFtEw33XXBOSM7/pub?output=csv&gid=0";
  const CSV_URL_JIDLO  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQz_ZmSJpBy2ebJ4lgXrYsQuPkx6WlQiBQWfqZUAZPKpgtot0aO8a-JNyts2yCQfFgFtEw33XXBOSM7/pub?output=csv&gid=2047802503";

  // =========================
  // parsování CSV řádku (respektuje uvozovky)
  // =========================
  function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current.trim());
    return result;
  }

  // =========================
  // načtení CSV přes fetch
  // =========================
  async function fetchCSV(url) {
    console.log("Načítám URL:", url);
    const res = await fetch(url);
    if (!res.ok) throw new Error("Chyba při stahování: " + res.status);
    const text = await res.text();
    console.log("Data přijata, délka:", text.length);
    return text.trim().split("\n").map(r => parseCSVLine(r));
  }

  // =========================
  // vykreslení tabulky do HTML
  // hasSize = true pro nápoje (4 sloupce), false pro jídlo (3 sloupce)
  // =========================
  function renderTable(data, title, hasSize = true) {
    console.log("Vykresluji tabulku:", title, "Počet řádků:", data.length);
    const container = document.getElementById("menu-container");

    const sectionTitle = document.createElement("h2");
    sectionTitle.className = "menu-subtitle";
    sectionTitle.id = title.toLowerCase().replace(/ /g, "-").normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    sectionTitle.innerText = title;
    
    // Upravený margin pro sjednocení s ostatními sekcemi
    if (title === "NÁPOJOVÝ LÍSTEK") {
      sectionTitle.style.marginTop = "60px";
    } else if (title === "JÍDELNÍ LÍSTEK") {
      sectionTitle.style.marginTop = "60px";
    }
    
    container.appendChild(sectionTitle);
    
    // Přidej čáru pod text
    if (title === "NÁPOJOVÝ LÍSTEK" || title === "JÍDELNÍ LÍSTEK") {
      const hr = document.createElement("hr");
      hr.style.borderTop = "1px solid rgba(255, 255, 255, 0.2)";
      hr.style.margin = "20px 0 5px 0";
      container.appendChild(hr);
    }

    const table = document.createElement("table");
    table.className = "menu-table";

    // Procházíme všechny řádky
    let rowIndex = 0;
    data.forEach(row => {
      if (!row[0] || row[0].trim() === "") return; // Přeskočí prázdné řádky
      
      const tr = document.createElement("tr");
      
      // První řádek v nápojovém lístku bude transparentní
      const isFirstRow = rowIndex === 0 && title === "NÁPOJOVÝ LÍSTEK";
      if (isFirstRow) {
        tr.style.opacity = "0";
        tr.style.height = "0";
        tr.style.overflow = "hidden";
      }

      if (hasSize) {
        // NÁPOJE: 4 sloupce (název, popis, velikost, cena)
        const hasPrice = row[3] && row[3].trim() !== "";
        
        if (!hasPrice) {
          tr.innerHTML = `
            <td colspan="4" class="menu-sub-category-td">
              <h3 class="menu-sub-category-title">${row[0]}</h3>
            </td>
          `;
        } else {
          tr.innerHTML = `
            <td class="item-name" style="padding: 12px 8px; width: 1%; white-space: nowrap;">${row[0] || ""}</td>
            <td class="item-description" style="padding: 12px 8px;">${row[1] || ""}</td>
            <td class="item-size" style="padding: 12px 8px; opacity: 0.8; font-size: 0.9em; width: 1%; white-space: nowrap;">${row[2] || ""}</td>
            <td class="item-price" style="padding: 12px 8px; font-weight: bold; text-align: right; width: 1%; white-space: nowrap;">${row[3] ? row[3] + ",- Kč" : ""}</td>
          `;
        }
      } else {
        // JÍDLO: 3 sloupce (název, popis, cena)
        const hasPrice = row[2] && row[2].trim() !== "";
        
        if (!hasPrice) {
          tr.innerHTML = `
            <td colspan="3" class="menu-sub-category-td">
              <h3 class="menu-sub-category-title">${row[0]}</h3>
            </td>
          `;
        } else {
          tr.innerHTML = `
            <td class="item-name" style="padding: 12px 8px; width: 1%; white-space: nowrap;">${row[0] || ""}</td>
            <td class="item-description" style="padding: 12px 8px;">${row[1] || ""}</td>
            <td class="item-price" style="padding: 12px 8px; font-weight: bold; text-align: right; width: 1%; white-space: nowrap;">${row[2] ? row[2] + ",- Kč" : ""}</td>
          `;
        }
      }
      table.appendChild(tr);
      rowIndex++;
    });

    container.appendChild(table);
  }

  // =========================
  // načteme oba CSV
  // =========================
  async function loadMenu() {
    try {
      console.log("Start loadMenu...");
      const napojeData = await fetchCSV(CSV_URL_NAPOJE);
      renderTable(napojeData, "NÁPOJOVÝ LÍSTEK", true);  // 4 sloupce s velikostí

      const jidloData  = await fetchCSV(CSV_URL_JIDLO);
      renderTable(jidloData, "JÍDELNÍ LÍSTEK", false);   // 3 sloupce bez velikosti
      // wait for layout to stabilize (two animation frames) then reposition decos
      if (typeof positionDecos === 'function') {
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        positionDecos();
        // run again shortly to account for late layout changes (images/fonts)
        setTimeout(() => { positionDecos(); randomizeDecosInsideTable(); }, 250);

        // observe future changes inside menu-container and reposition when content changes
        const mc = document.getElementById('menu-container');
        if (mc && window.MutationObserver) {
          const mo = new MutationObserver(() => { setTimeout(() => { positionDecos(); randomizeDecosInsideTable(); }, 80); });
          mo.observe(mc, { childList: true, subtree: true });
        }
      }
    } catch(err) {
      console.error("Chyba při načítání menu:", err);
      const container = document.getElementById("menu-container");
      container.innerHTML += `<p style="color: red;">Chyba: ${err.message}</p>`;
    }
  }

  loadMenu().then(() => { try { initScrollParallax(); } catch(e) { /* ignore */ } });

  // =========================
  // Scroll / Parallax pro .aux-img
  // =========================
  function initScrollParallax() {
    const container = document.querySelector('.menu-aux');
    if (!container) return;
    const imgs = Array.from(container.querySelectorAll('.aux-img'));

    // assign a data-speed if not present (range -0.25 .. 0.25)
       imgs.forEach((img, i) => {
     if (!img.dataset.speed) {
         // pouze kladná rychlost pro pohyb jen dolů: 0.15 .. 0.6
       const s = 0.5;
      img.dataset.speed = s;
      }
      img.style.willChange = 'transform';
    });


    let ticking = false;

    function update() {
      const containerTop = container.getBoundingClientRect().top + window.scrollY;
      const scrollY = window.scrollY || window.pageYOffset;
      imgs.forEach(img => {
        const speed = parseFloat(img.dataset.speed) || 0;
        const offset = (scrollY - containerTop) * speed * 1.2; // amplify movement
        img.style.transform = `translate(-50%, calc(-50% + ${offset}px))`;
      });
      ticking = false;
    }

    function onScroll() {
      if (!ticking) {
        window.requestAnimationFrame(update);
        ticking = true;
      }
    }

    // initial update
    update();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', () => { update(); }, { passive: true });
  }
  // after menu is rendered, adjust deco positions
  function positionDecos() {
    const menuContainer = document.getElementById('menu-container');
    if (!menuContainer) return;
    const decos = menuContainer.querySelectorAll('.deco-img');
    decos.forEach(img => {
      // prefer data-top-percent if present, otherwise parse inline percent
      let inlineStyle = img.getAttribute('style') || '';
      const topMatch = (img.getAttribute('data-top-percent') || '').match(/([0-9.]+)/) || inlineStyle.match(/top:\s*([0-9.]+)%/);
      if (topMatch) {
        img.style.top = topMatch[1] + '%';
      }
      const leftMatch = inlineStyle.match(/left:\s*([0-9.]+)%/);
      if (leftMatch) {
        img.style.left = leftMatch[1] + '%';
      }
    });
  }

  // debounce resize
  let _posTimer;
  window.addEventListener('resize', () => { clearTimeout(_posTimer); _posTimer = setTimeout(positionDecos, 120); });

  // call after initial load and after a short delay (in case fonts/images change layout)
  window.addEventListener('load', () => setTimeout(positionDecos, 120));

  // Randomize decorative images inside the visible menu table area
  function randomizeDecosInsideTable() {
    const container = document.getElementById('menu-container');
    if (!container) return;
    const table = container.querySelector('.menu-table');
    const decos = container.querySelectorAll('.deco-img');
    if (!table || decos.length === 0) return;
    const rect = table.getBoundingClientRect();
    const contRect = container.getBoundingClientRect();
    // compute relative top range [%] within container that corresponds to table
    const topStart = Math.max(0, (rect.top - contRect.top) / contRect.height) * 100;
    const topEnd = Math.min(100, (rect.bottom - contRect.top) / contRect.height) * 100;
    decos.forEach(img => {
      const leftPct = 5 + Math.random() * 90; // 5%..95%
      const topPct = topStart + Math.random() * Math.max(0, topEnd - topStart);
      img.style.left = leftPct + '%';
      img.style.top = topPct + '%';
    });
  }
</script>

<script>
  const hamburger = document.getElementById('hamburger');
  const navMenu = document.getElementById('navMenu');
  const headerLinks = navMenu.querySelectorAll('.header-link');

 
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('active');
      navMenu.classList.toggle('active');
      document.querySelector('main')?.classList.toggle('menu-open');
      document.querySelector('.mobile-menu-buttons')?.classList.toggle('menu-open');
      // removed dynamic paddingTop; layout handled by CSS (.menu-open)
       
    });
  headerLinks.forEach(link => {
        link.addEventListener('click', () => {
          hamburger.classList.remove('active');
          navMenu.classList.remove('active');
          document.querySelector('main')?.classList.remove('menu-open');
          document.querySelector('.mobile-menu-buttons')?.classList.remove('menu-open');
        });
  });
</script>


</body>
</html>
